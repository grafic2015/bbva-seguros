version: '3.8'

# ═════════════════════════════════════════════════════════════════════════
# BBVA Seguros - Docker Compose
#
# 📌 Modos de uso:
#
# 1. CON SUPABASE (producción):
#    docker-compose up -d backend
#    (PostgreSQL no necesario, usa DATABASE_URL de Supabase)
#
# 2. CON POSTGRES LOCAL (desarrollo sin conexión internet):
#    docker-compose up -d
#    (Levanta postgres + backend)
# ═════════════════════════════════════════════════════════════════════════

services:
  # ─────────────────────────────────────────────────────────────────────
  # PostgreSQL Local (OPCIONAL - solo si no usas Supabase)
  # ─────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: bbva_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bbva_seguros
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bbva_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - local  # Usar: docker-compose --profile local up

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bbva_backend
    environment:
      # 🗄️  BASE DE DATOS
      # Supabase: DATABASE_URL=postgresql://postgres.xxxx:pass@pooler.supabase.com:6543/postgres
      # Local:    DATABASE_URL=postgresql://postgres:postgres@postgres:5432/bbva_seguros
      DATABASE_URL: ${DATABASE_URL}

      # Supabase (opcional)
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}

      # 🔑 API Keys
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}

      # 📱 Instagram
      INSTAGRAM_EMAIL: ${INSTAGRAM_EMAIL}
      INSTAGRAM_PASSWORD: ${INSTAGRAM_PASSWORD}
      INSTAGRAM_ACCOUNTS: ${INSTAGRAM_ACCOUNTS}

      # 🌐 Servidor
      HOST: ${HOST}
      PORT: ${PORT}
      ENVIRONMENT: ${ENVIRONMENT}
      DEBUG: ${DEBUG}
      LOG_LEVEL: ${LOG_LEVEL}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}

      # 🚀 Uvicorn
      UVICORN_WORKERS: ${UVICORN_WORKERS}

    ports:
      - "${PORT}:${PORT}"
    depends_on:
      - postgres
    networks:
      - bbva_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local

networks:
  bbva_network:
    driver: bridge
