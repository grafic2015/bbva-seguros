services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bbva_backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      AUTH_SALT: ${AUTH_SALT:-bbva-seguros-salt-v1}
      INSTAGRAM_USERNAME: ${INSTAGRAM_USERNAME}
      INSTAGRAM_PASSWORD: ${INSTAGRAM_PASSWORD}
      INSTAGRAM_ACCOUNTS: ${INSTAGRAM_ACCOUNTS}
      IG_SESSION_FILE: /app/data/ig_session.json
      IG_POSTS_TO_CHECK: ${IG_POSTS_TO_CHECK:-5}
      IG_TOTP_SEED: ${IG_TOTP_SEED:-}
      IG_MAX_DM_PER_DAY: ${IG_MAX_DM_PER_DAY:-40}
      IG_MAX_NEW_PER_CYCLE: ${IG_MAX_NEW_PER_CYCLE:-5}
      IG_ACTIVE_HOURS: ${IG_ACTIVE_HOURS:-8-23}
      IG_TIMEZONE: ${IG_TIMEZONE:-America/Argentina/Buenos_Aires}
      IG_MONITOR_ENABLED: ${IG_MONITOR_ENABLED:-true}
      IG_MONITOR_INTERVAL: ${IG_MONITOR_INTERVAL:-600}
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./certs:/app/certs:ro
      - ./data:/app/data
    restart: unless-stopped
